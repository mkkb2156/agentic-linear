## VPS Deployment — Independent agents + Dashboard
#
# Usage:
#   docker-compose -f docker-compose.vps.yml up -d
#
# This runs:
#   - Redis (task queue + live state)
#   - PostgreSQL (metrics, logs)
#   - Gateway (webhook receiver + dashboard API)
#   - 11 independent agent workers
#   - Dashboard (Next.js frontend)

services:
  # ── Infrastructure ────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gds_agents
      POSTGRES_USER: gds
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Gateway (webhook receiver + API) ──────────────────────────────────

  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DISPATCH_MODE: redis
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
      CORS_ORIGINS: http://localhost:3000,http://dashboard:3000
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Agent Workers ─────────────────────────────────────────────────────

  worker-strategist:
    build: .
    command: python -m services.worker.main --role product_strategist
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-spec:
    build: .
    command: python -m services.worker.main --role spec_architect
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-architect:
    build: .
    command: python -m services.worker.main --role system_architect
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-frontend:
    build: .
    command: python -m services.worker.main --role frontend_engineer
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-backend:
    build: .
    command: python -m services.worker.main --role backend_engineer
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-qa:
    build: .
    command: python -m services.worker.main --role qa_engineer
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-devops:
    build: .
    command: python -m services.worker.main --role devops
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-release:
    build: .
    command: python -m services.worker.main --role release_manager
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-infra:
    build: .
    command: python -m services.worker.main --role infra_ops
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-cloud:
    build: .
    command: python -m services.worker.main --role cloud_ops
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-admin:
    build: .
    command: python -m services.worker.main --role admin
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://gds:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gds_agents
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Dashboard ─────────────────────────────────────────────────────────

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://gateway:8000
      NEXT_PUBLIC_WS_URL: ws://gateway:8000
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
